global_costmap:
  ros__parameters:
    use_sim_time: true
    
    global_frame: map_2d
    robot_base_frame: chassis
    
    # rolling_window: true
    width: 50
    height: 50

    resolution: 0.05
    
    update_frequency: 2.0
    publish_frequency: 1.0
    
    # Define your actual robot size
    # Adjust [x_forward, y_left], [x_forward, y_right], [x_back, y_right], [x_back, y_left]
    footprint: "[ [0.775, 0.375], [0.775, -0.375], [-0.775, -0.375], [-0.775, 0.375] ]"
    footprint_padding: 0.05 # Safety buffer
    
    plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
    
    static_layer:
      plugin: "nav2_costmap_2d::StaticLayer"
      enabled: true  # No pre-made map in exploration mode
      map_topic: /map_2d
      subscribe_to_updates: true  # Update if /map changes
      first_map_only: false
      track_unknown_space: true  # Treat unknown cells as obstacles
    
    obstacle_layer:
      plugin: "nav2_costmap_2d::ObstacleLayer"
      enabled: true
      observation_sources: scan
      scan:
        topic: /scan_frontier  # Same as SLAM's scan_topic
        clearing: false # Only useful for dynamic environments
        marking: true
        data_type: "LaserScan"
        obstacle_max_range: 10.0
        obstacle_min_range: 0.0
    
    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      enabled: true
      cost_scaling_factor: 5.0
      inflation_radius: 1.0  # Safety buffer (adjust based on robot size)
